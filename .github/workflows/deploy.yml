name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (for yarn classic pinned in package.json)
        run: corepack enable

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ${{ vars.REACT_APP_BACKEND_URL }}
          GENERATE_SOURCEMAP: false
          CI: false
          DISABLE_ESLINT_PLUGIN: true
        run: yarn build

      # Pre-render per-route HTML so GitHub Pages returns HTTP 200 for every
      # SEO-indexable URL. Without this, BrowserRouter routes would 404 and
      # Google / Bing would skip indexing them. Each file is a copy of
      # index.html — when the SPA boots, react-router reads location.pathname
      # and renders the correct page.
      - name: Pre-render SPA routes for SEO (200 OK on deep links)
        working-directory: frontend/build
        run: |
          for route in senra tools systems about contact; do
            # /senra.html  → served when user visits /senra (GH Pages pretty URLs)
            cp index.html "${route}.html"
            # /senra/index.html → served when user visits /senra/
            mkdir -p "${route}"
            cp index.html "${route}/index.html"
          done
          # 404.html fallback keeps any future client-only routes functional
          cp index.html 404.html
          echo "Pre-rendered routes:"
          ls -la *.html
          ls -la senra tools systems about contact 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
