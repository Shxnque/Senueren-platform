        <!-- 6. FAQPage — targets long-tail queries AND feeds AI search engines -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "FAQPage",
            "mainEntity": [
                {
                    "@type": "Question",
                    "name": "How do I find government tenders in South Africa for free?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "SENRA (senueren.co.za) aggregates live tenders from eTenders, SANRAL, Transnet, Eskom, SARS, National Treasury, SABS, SITA, and all eight South African metros — completely free, no signup. Each tender is scored by relevance, value potential and urgency so you can focus on what matters for your business."
                    }
                },
                {
                    "@type": "Question",
                    "name": "What is a BOQ and how do I estimate one quickly?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "A Bill of Quantities (BOQ) lists every line item, quantity and rate on a construction project. SENRA's free BOQ Rough Estimator lets you enter quantities for 12 common line items (concrete, paving, brickwork, roofing, foundations, electrical, plumbing, tiling, ceilings, plastering, trenching, windows) and returns an indicative ZAR cost range including P&Gs, contingency and 15% VAT — a 5-minute sanity check before committing a full priced BOQ."
                    }
                },
                {
                    "@type": "Question",
                    "name": "What is a CIDB grade and how do I know what grade a tender needs?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "CIDB grades (1 to 9) determine the maximum contract value a contractor can bid on in South Africa. Grade 1 caps around R200k; Grade 9 is unlimited. SENRA suggests the likely grade band (1-3, 4-6 or 7-9) for every construction-adjacent tender in the feed, based on the contract size signal and issuing organisation. Always verify against the tender documents before bidding."
                    }
                },
                {
                    "@type": "Question",
                    "name": "What is the difference between an RFQ and a tender?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "An RFQ (Request for Quotation) is typically a smaller, faster procurement — used for goods or services under a quotation threshold (often under R500k). A tender (RFP) is a larger, more formal process with bonds, compulsory briefings and multi-stage evaluation. SENRA shows both, clearly labelled with size tier (SMALL / MEDIUM / LARGE) so you can filter by contract scale."
                    }
                },
                {
                    "@type": "Question",
                    "name": "Should I include VAT in my tender quote?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "Yes, if you're VAT-registered (turnover above R1 million p.a.), you must include 15% VAT on your quote. The SENRA Margin Calculator and BOQ Estimator both have a VAT toggle — flip it on to show inclusive-of-VAT pricing, off to show ex-VAT. Never quote a client without being explicit about VAT status."
                    }
                },
                {
                    "@type": "Question",
                    "name": "How do I decide whether to bid on a tender or walk away?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "Use the SENRA Bid / No-Bid Viability tool. Rate 9 factors from 1 to 10: industry fit, contract value, cashflow resilience, CIDB grade fit, timeline feasibility, effort required, competitive position, travel distance and site access. The tool computes a weighted score and gives a verdict — BID (score 70+), CONSIDER (50-69), or PASS (below 50). It also auto-flags risks like cashflow danger and CIDB mismatch."
                    }
                },
                {
                    "@type": "Question",
                    "name": "How much retention is typical on SA construction contracts?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "Retention in South African construction is typically 5-10% held for 6-12 months after practical completion, sometimes longer on government contracts. This is money you've earned but haven't been paid yet. SENRA's Margin Calculator lets you enter your retention % and shows the cash you actually see at completion — crucial for cashflow planning."
                    }
                },
                {
                    "@type": "Question",
                    "name": "What are P&Gs in a construction tender?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "P&Gs (Preliminaries & Generals) cover everything you need on site that isn't a specific scope item — site establishment, supervision, plant hire, insurances, bonds. Typically 8-15% on top of direct cost. The SENRA BOQ Estimator treats P&Gs as a first-class input so your sanity-check range reflects the real total."
                    }
                }
            ]
        }
